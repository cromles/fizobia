[project]
name = "oam-agent"
version = "0.1.0"
description = "Open Agent Mesh (OAM) — ajan SDK'sı"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0,<3.0",
    "httpx>=0.27,<1.0",
    "fastapi>=0.115,<1.0",
    "websockets>=13.0,<15.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["oam_agent*"]
